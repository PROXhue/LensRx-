<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IngredientLens</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #050a0a;
–surface: #0d1a1a;
–border: #1a3333;
–accent: #00e5a0;
–accent2: #00b4d8;
–warn: #ff6b35;
–text: #e0f5f0;
–muted: #4a8080;
–scan-line: rgba(0, 229, 160, 0.4);
}

html, body {
width: 100%; height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
overflow: hidden;
user-select: none;
}

/* ── HEADER ── */
#header {
position: fixed; top: 0; left: 0; right: 0; z-index: 50;
display: flex; align-items: center; justify-content: space-between;
padding: 14px 20px;
background: linear-gradient(to bottom, rgba(5,10,10,0.95), transparent);
}
#logo {
font-family: ‘Space Mono’, monospace;
font-size: 15px; font-weight: 700;
color: var(–accent);
letter-spacing: 2px;
text-transform: uppercase;
}
#logo span { color: var(–muted); }
#status-dot {
width: 8px; height: 8px;
border-radius: 50%;
background: var(–muted);
transition: background 0.3s;
}
#status-dot.active { background: var(–accent); box-shadow: 0 0 8px var(–accent); animation: pulse-dot 1.5s infinite; }
#status-dot.loading { background: var(–accent2); animation: pulse-dot 0.6s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── CAMERA VIEW ── */
#cam-wrap {
position: fixed; inset: 0;
}
#video {
width: 100%; height: 100%;
object-fit: cover;
display: block;
}
#canvas { display: none; }

/* ── SCAN OVERLAY ── */
#scan-overlay {
position: fixed; inset: 0;
pointer-events: none;
z-index: 10;
opacity: 0;
transition: opacity 0.3s;
}
#scan-overlay.visible { opacity: 1; }

/* Corner brackets */
.corner {
position: absolute;
width: 36px; height: 36px;
border-color: var(–accent);
border-style: solid;
opacity: 0.9;
}
.corner.tl { top: 18%; left: 6%; border-width: 2px 0 0 2px; }
.corner.tr { top: 18%; right: 6%; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 40%; left: 6%; border-width: 0 0 2px 2px; }
.corner.br { bottom: 40%; right: 6%; border-width: 0 2px 2px 0; }

/* Scan line */
#scan-line {
position: absolute;
left: 6%; right: 6%;
top: 18%;
height: 2px;
background: linear-gradient(90deg, transparent, var(–scan-line), var(–accent), var(–scan-line), transparent);
box-shadow: 0 0 12px var(–accent);
transform: translateY(0);
animation: scan-sweep 2s linear infinite;
}
@keyframes scan-sweep {
0%   { top: 18%; opacity: 1; }
85%  { opacity: 1; }
100% { top: 60%; opacity: 0; }
}

/* ── RESULTS PANEL ── */
#results-panel {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 30;
max-height: 48vh;
display: flex; flex-direction: column;
background: linear-gradient(to top, rgba(5,10,10,0.97) 70%, transparent);
padding: 24px 20px 36px;
transform: translateY(100%);
transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
#results-panel.visible { transform: translateY(0); }

#results-label {
font-family: ‘Space Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 14px;
}

#ingredients-list {
overflow-y: auto;
flex: 1;
display: flex;
flex-direction: column;
gap: 10px;
}
#ingredients-list::-webkit-scrollbar { width: 3px; }
#ingredients-list::-webkit-scrollbar-track { background: transparent; }
#ingredients-list::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.ingredient-card {
background: rgba(13, 26, 26, 0.8);
border: 1px solid var(–border);
border-left: 3px solid var(–accent);
border-radius: 8px;
padding: 10px 14px;
animation: card-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
.ingredient-card.warn { border-left-color: var(–warn); }
@keyframes card-in {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}

.ing-name {
font-family: ‘Space Mono’, monospace;
font-size: 13px;
color: var(–accent);
font-weight: 700;
letter-spacing: 0.5px;
}
.ingredient-card.warn .ing-name { color: var(–warn); }

.ing-detail {
font-size: 12px;
color: #8ab8b8;
margin-top: 3px;
line-height: 1.5;
}
.ing-amount {
font-family: ‘Space Mono’, monospace;
font-size: 11px;
color: var(–muted);
margin-top: 4px;
}

/* ── START SCREEN ── */
#start-screen {
position: fixed; inset: 0; z-index: 60;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: var(–bg);
gap: 20px;
padding: 40px;
text-align: center;
}
#start-icon {
width: 80px; height: 80px;
border: 2px solid var(–accent);
border-radius: 18px;
display: flex; align-items: center; justify-content: center;
font-size: 36px;
background: rgba(0,229,160,0.05);
box-shadow: 0 0 40px rgba(0,229,160,0.15);
}
#start-screen h1 {
font-family: ‘Space Mono’, monospace;
font-size: 22px;
color: var(–accent);
letter-spacing: 2px;
}
#start-screen p {
font-size: 14px;
color: var(–muted);
line-height: 1.7;
max-width: 280px;
}
#start-btn {
margin-top: 10px;
padding: 15px 40px;
background: var(–accent);
color: var(–bg);
border: none;
border-radius: 50px;
font-family: ‘Space Mono’, monospace;
font-size: 13px;
font-weight: 700;
letter-spacing: 2px;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
}
#start-btn:active { transform: scale(0.96); }
#start-btn:hover { box-shadow: 0 0 24px rgba(0,229,160,0.4); }

/* ── HUD elements ── */
#hud-bottom {
position: fixed; bottom: 0; left: 0; right: 0;
z-index: 20;
padding: 20px;
display: flex; justify-content: center;
pointer-events: none;
}
#scanning-badge {
font-family: ‘Space Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
color: var(–accent);
background: rgba(5,10,10,0.8);
border: 1px solid rgba(0,229,160,0.3);
border-radius: 50px;
padding: 8px 20px;
opacity: 0;
transition: opacity 0.3s;
text-transform: uppercase;
}
#scanning-badge.visible { opacity: 1; }

/* ── LOADING indicator ── */
#loading-ring {
position: fixed;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
z-index: 25;
width: 48px; height: 48px;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s;
}
#loading-ring.visible { opacity: 1; }
#loading-ring svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── NOT FOUND ── */
#no-result {
position: fixed; top: 50%; left: 50%;
transform: translate(-50%, -50%);
z-index: 25;
font-family: ‘Space Mono’, monospace;
font-size: 11px;
color: var(–muted);
letter-spacing: 2px;
text-align: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}
#no-result.visible { opacity: 1; }

/* Freeze flash */
#flash {
position: fixed; inset: 0; z-index: 5;
background: white;
opacity: 0;
pointer-events: none;
}
#flash.flash { animation: do-flash 0.25s ease-out; }
@keyframes do-flash { 0%{opacity:0.25} 100%{opacity:0} }
</style>

</head>
<body>

<!-- Start screen -->

<div id="start-screen">
  <div id="start-icon">🔬</div>
  <h1>INGREDIENT<br>LENS</h1>
  <p>Point your camera at any label — active ingredients appear instantly, no photo needed.</p>
  <button id="start-btn" onclick="startScanner()">START SCANNING</button>
</div>

<!-- Camera -->

<div id="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<!-- Flash effect -->

<div id="flash"></div>

<!-- Header -->

<div id="header">
  <div id="logo">Ingredient<span>Lens</span></div>
  <div id="status-dot"></div>
</div>

<!-- Scan overlay -->

<div id="scan-overlay">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="scan-line"></div>
</div>

<!-- Loading -->

<div id="loading-ring">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="20" stroke="#1a3333" stroke-width="3"/>
    <path d="M24 4 A20 20 0 0 1 44 24" stroke="#00e5a0" stroke-width="3" stroke-linecap="round"/>
  </svg>
</div>

<!-- No result text -->

<div id="no-result">POINT AT A LABEL</div>

<!-- Scanning badge -->

<div id="hud-bottom">
  <div id="scanning-badge">● LIVE SCAN</div>
</div>

<!-- Results panel -->

<div id="results-panel">
  <div id="results-label">Active Ingredients</div>
  <div id="ingredients-list"></div>
</div>

<script>
const SCAN_INTERVAL = 3000; // ms between scans
const API_MODEL = "claude-sonnet-4-20250514";

let scanning = false;
let scanTimer = null;
let isAnalyzing = false;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const statusDot = document.getElementById('status-dot');
const scanOverlay = document.getElementById('scan-overlay');
const resultsPanel = document.getElementById('results-panel');
const ingredientsList = document.getElementById('ingredients-list');
const loadingRing = document.getElementById('loading-ring');
const noResult = document.getElementById('no-result');
const scanBadge = document.getElementById('scanning-badge');
const flash = document.getElementById('flash');

async function startScanner() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();

    document.getElementById('start-screen').style.display = 'none';
    scanOverlay.classList.add('visible');
    scanBadge.classList.add('visible');
    statusDot.classList.add('active');
    noResult.classList.add('visible');

    scanning = true;
    scheduleNextScan();
  } catch (e) {
    alert('Camera access denied. Please allow camera permissions and reload.');
  }
}

function scheduleNextScan() {
  if (!scanning) return;
  scanTimer = setTimeout(captureAndAnalyze, SCAN_INTERVAL);
}

async function captureAndAnalyze() {
  if (!scanning || isAnalyzing) { scheduleNextScan(); return; }
  isAnalyzing = true;

  // Capture frame
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

  // Flash
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  // UI: loading
  statusDot.className = 'loading';
  loadingRing.classList.add('visible');
  noResult.classList.remove('visible');

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: API_MODEL,
        max_tokens: 1000,
        system: `You are a pharmaceutical/health product ingredient scanner. Analyze the image for any product label, drug facts panel, supplement facts, or ingredient list.

Extract ACTIVE INGREDIENTS only (not inactive/inactive excipients unless no active section exists).

Respond ONLY with a JSON array. No markdown, no preamble. Format:
[
  {
    "name": "Ingredient name",
    "amount": "Dosage or percentage if visible, else null",
    "purpose": "Brief 1-sentence purpose/function",
    "flag": false
  }
]

Set "flag": true if the ingredient is a known allergen, controlled substance, or has significant interaction risks.

If no ingredient label is visible, return: []`,
        messages: [{
          role: "user",
          content: [{
            type: "image",
            source: { type: "base64", media_type: "image/jpeg", data: base64 }
          }, {
            type: "text",
            text: "Extract active ingredients from this label."
          }]
        }]
      })
    });

    const data = await response.json();
    const raw = data.content?.map(b => b.text || '').join('') || '[]';
    const clean = raw.replace(/```json|```/g, '').trim();
    const ingredients = JSON.parse(clean);

    renderIngredients(ingredients);
  } catch (err) {
    console.error(err);
    // silently continue scanning
  }

  // Reset UI
  statusDot.className = 'active';
  loadingRing.classList.remove('visible');
  isAnalyzing = false;
  scheduleNextScan();
}

function renderIngredients(list) {
  if (!list || list.length === 0) {
    resultsPanel.classList.remove('visible');
    noResult.classList.add('visible');
    return;
  }

  noResult.classList.remove('visible');
  ingredientsList.innerHTML = '';

  list.forEach((ing, i) => {
    const card = document.createElement('div');
    card.className = 'ingredient-card' + (ing.flag ? ' warn' : '');
    card.style.animationDelay = `${i * 60}ms`;

    const amountHtml = ing.amount
      ? `<div class="ing-amount">${ing.amount}</div>`
      : '';
    const flagHtml = ing.flag
      ? `<span style="font-size:10px;color:var(--warn);margin-left:6px;font-family:'Space Mono',monospace">⚠ FLAGGED</span>`
      : '';

    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:4px">
        <div class="ing-name">${ing.name}</div>${flagHtml}
      </div>
      <div class="ing-detail">${ing.purpose || ''}</div>
      ${amountHtml}
    `;
    ingredientsList.appendChild(card);
  });

  resultsPanel.classList.add('visible');
}
</script>

</body>
</html>
