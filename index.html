<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IngredientLens</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #06080f;
    --surface: #0d1120;
    --border: #1c2440;
    --accent: #4f8ef7;
    --accent2: #7c5ff5;
    --warn: #f7834f;
    --green: #3dd68c;
    --text: #dde4f5;
    --muted: #4a5580;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

/* ── START SCREEN ── */
#start-screen {
position: fixed; inset: 0; z-index: 80;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: var(–bg);
gap: 18px; padding: 40px; text-align: center;
}
.start-icon {
width: 84px; height: 84px;
border-radius: 22px;
background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(124,95,245,0.12));
border: 1.5px solid rgba(79,142,247,0.4);
display: flex; align-items: center; justify-content: center;
font-size: 38px;
box-shadow: 0 0 40px rgba(79,142,247,0.15);
}
#start-screen h1 {
font-family: ‘Space Mono’, monospace;
font-size: 20px; color: var(–text);
letter-spacing: 1px; line-height: 1.4;
}
#start-screen h1 span { color: var(–accent); }
#start-screen p { font-size: 13px; color: var(–muted); line-height: 1.7; max-width: 280px; }

.mode-cards {
display: flex; gap: 10px; width: 100%; max-width: 320px;
}
.mode-card {
flex: 1; padding: 14px 10px;
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 14px;
text-align: center; cursor: pointer;
transition: border-color 0.2s, background 0.2s;
}
.mode-card:active { background: rgba(79,142,247,0.1); }
.mode-card.selected { border-color: var(–accent); background: rgba(79,142,247,0.07); }
.mode-card .mc-icon { font-size: 24px; margin-bottom: 6px; }
.mode-card .mc-label { font-size: 11px; font-family: ‘Space Mono’, monospace; color: var(–muted); letter-spacing: 1px; }
.mode-card.selected .mc-label { color: var(–accent); }

#start-btn {
margin-top: 6px;
padding: 15px 44px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #fff;
border: none; border-radius: 50px;
font-family: ‘Space Mono’, monospace;
font-size: 12px; font-weight: 700; letter-spacing: 2px;
cursor: pointer;
box-shadow: 0 4px 20px rgba(79,142,247,0.3);
transition: transform 0.15s;
}
#start-btn:active { transform: scale(0.96); }

/* ── CAMERA ── */
#cam-wrap { position: fixed; inset: 0; }
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
#canvas { display: none; }
#flash {
position: fixed; inset: 0; z-index: 5;
background: white; opacity: 0; pointer-events: none;
}
#flash.flash { animation: do-flash 0.3s ease-out; }
@keyframes do-flash { 0%{opacity:0.3} 100%{opacity:0} }

/* ── HEADER ── */
#header {
position: fixed; top: 0; left: 0; right: 0; z-index: 50;
display: flex; align-items: center; justify-content: space-between;
padding: 14px 20px;
background: linear-gradient(to bottom, rgba(6,8,15,0.95), transparent);
}
#logo {
font-family: ‘Space Mono’, monospace;
font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
color: var(–accent);
}
#mode-badge {
font-family: ‘Space Mono’, monospace;
font-size: 9px; letter-spacing: 1px;
color: var(–muted);
background: rgba(13,17,32,0.8);
border: 1px solid var(–border);
border-radius: 20px; padding: 4px 12px;
}
#status-dot {
width: 8px; height: 8px; border-radius: 50%;
background: var(–muted); transition: background 0.3s;
}
#status-dot.active { background: var(–green); box-shadow: 0 0 8px var(–green); animation: pulse-dot 2s infinite; }
#status-dot.loading { background: var(–accent); animation: pulse-dot 0.5s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── SCAN OVERLAYS ── */
#scan-overlay {
position: fixed; inset: 0; pointer-events: none; z-index: 10;
opacity: 0; transition: opacity 0.3s;
}
#scan-overlay.visible { opacity: 1; }
.corner {
position: absolute; width: 32px; height: 32px;
border-color: var(–accent); border-style: solid; opacity: 0.8;
}
.corner.tl { top: 20%; left: 6%; border-width: 2px 0 0 2px; }
.corner.tr { top: 20%; right: 6%; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 38%; left: 6%; border-width: 0 0 2px 2px; }
.corner.br { bottom: 38%; right: 6%; border-width: 0 2px 2px 0; }
#scan-line {
position: absolute; left: 6%; right: 6%; top: 20%;
height: 1.5px;
background: linear-gradient(90deg, transparent, rgba(79,142,247,0.4), var(–accent), rgba(79,142,247,0.4), transparent);
box-shadow: 0 0 10px var(–accent);
animation: scan-sweep 2.5s linear infinite;
}
@keyframes scan-sweep {
0%   { top: 20%; opacity: 1; }
90%  { opacity: 1; }
100% { top: 62%; opacity: 0; }
}

#receipt-overlay {
position: fixed; inset: 8px; pointer-events: none; z-index: 10;
border: 1.5px solid rgba(79,142,247,0.3);
border-radius: 12px;
opacity: 0; transition: opacity 0.3s;
}
#receipt-overlay.visible { opacity: 1; }
#receipt-overlay::before {
content: ‘INVOICE MODE’;
position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
font-family: ‘Space Mono’, monospace;
font-size: 9px; letter-spacing: 3px;
color: var(–accent); background: rgba(6,8,15,0.75);
padding: 4px 14px; border-radius: 20px;
}

/* ── LOADING ── */
#loading-ring {
position: fixed; top: 50%; left: 50%;
transform: translate(-50%, -50%);
z-index: 25; width: 52px; height: 52px;
opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
#loading-ring.visible { opacity: 1; }
#loading-ring svg { animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

#hint {
position: fixed; top: 50%; left: 50%;
transform: translate(-50%, -50%);
font-family: ‘Space Mono’, monospace; font-size: 10px;
color: var(–muted); letter-spacing: 2px; text-align: center;
opacity: 0; pointer-events: none; transition: opacity 0.3s;
white-space: nowrap;
}
#hint.visible { opacity: 1; }

/* ── RESULTS ── */
#results-panel {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
max-height: 55vh;
display: flex; flex-direction: column;
background: linear-gradient(to top, rgba(6,8,15,0.98) 75%, transparent);
padding: 20px 18px 34px;
transform: translateY(100%);
transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}
#results-panel.visible { transform: translateY(0); }

#results-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 12px;
}
#results-label {
font-family: ‘Space Mono’, monospace;
font-size: 10px; letter-spacing: 3px; color: var(–muted); text-transform: uppercase;
}
#drug-count {
font-family: ‘Space Mono’, monospace;
font-size: 10px; color: var(–accent);
background: rgba(79,142,247,0.12);
border: 1px solid rgba(79,142,247,0.2);
border-radius: 10px; padding: 2px 10px;
}

#ingredients-list {
overflow-y: auto; flex: 1;
display: flex; flex-direction: column; gap: 10px;
padding-right: 2px;
}
#ingredients-list::-webkit-scrollbar { width: 3px; }
#ingredients-list::-webkit-scrollbar-track { background: transparent; }
#ingredients-list::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

/* Invoice drug card */
.drug-group {
background: rgba(13,17,32,0.85);
border: 1px solid var(–border);
border-radius: 12px; overflow: hidden;
animation: card-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes card-in {
from { opacity:0; transform:translateY(14px); }
to   { opacity:1; transform:translateY(0); }
}
.drug-header {
display: flex; align-items: center; justify-content: space-between;
padding: 10px 14px;
background: rgba(79,142,247,0.06);
border-bottom: 1px solid var(–border);
}
.drug-name {
font-family: ‘Space Mono’, monospace;
font-size: 11px; color: var(–accent); font-weight: 700;
}
.drug-price {
font-family: ‘Space Mono’, monospace;
font-size: 11px; color: var(–muted);
}
.drug-ingredients {
padding: 8px 14px 10px;
display: flex; flex-direction: column; gap: 6px;
}
.active-ing {
display: flex; align-items: flex-start; gap: 8px;
}
.ing-dot {
width: 6px; height: 6px; border-radius: 50%;
background: var(–green);
margin-top: 5px; flex-shrink: 0;
}
.ing-dot.warn { background: var(–warn); }
.ing-text { flex: 1; }
.ing-name-text { font-size: 13px; color: var(–text); font-weight: 600; }
.ing-desc { font-size: 11px; color: var(–muted); margin-top: 1px; line-height: 1.4; }
.ing-dose { font-family: ‘Space Mono’, monospace; font-size: 10px; color: rgba(79,142,247,0.7); margin-top: 2px; }

/* Label ingredient card */
.ingredient-card {
background: rgba(13,17,32,0.85);
border: 1px solid var(–border);
border-left: 3px solid var(–green);
border-radius: 10px;
padding: 10px 14px;
animation: card-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
.ingredient-card.warn { border-left-color: var(–warn); }
.ing-name-l { font-family: ‘Space Mono’, monospace; font-size: 13px; color: var(–green); font-weight: 700; }
.ingredient-card.warn .ing-name-l { color: var(–warn); }
.ing-detail-l { font-size: 12px; color: #7a90c0; margin-top: 3px; line-height: 1.5; }
.ing-amount-l { font-family: ‘Space Mono’, monospace; font-size: 11px; color: var(–muted); margin-top: 4px; }
</style>

</head>
<body>

<!-- START SCREEN -->

<div id="start-screen">
  <div class="start-icon">🔬</div>
  <h1>Ingredient<span>Lens</span></h1>
  <p>Live camera scanner — point at a drug label or pharmacy invoice to instantly reveal active ingredients.</p>

  <div class="mode-cards">
    <div class="mode-card selected" id="card-label" onclick="selectMode('label')">
      <div class="mc-icon">💊</div>
      <div class="mc-label">LABEL<br>SCAN</div>
    </div>
    <div class="mode-card" id="card-invoice" onclick="selectMode('invoice')">
      <div class="mc-icon">🧾</div>
      <div class="mc-label">INVOICE<br>SCAN</div>
    </div>
  </div>

<button id="start-btn" onclick="startScanner()">START CAMERA</button>

</div>

<!-- CAMERA -->

<div id="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>
<div id="flash"></div>

<!-- HEADER -->

<div id="header">
  <div id="logo">IngredientLens</div>
  <div id="mode-badge">—</div>
  <div id="status-dot"></div>
</div>

<!-- OVERLAYS -->

<div id="scan-overlay">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="scan-line"></div>
</div>
<div id="receipt-overlay"></div>

<!-- LOADING -->

<div id="loading-ring">
  <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
    <circle cx="26" cy="26" r="22" stroke="#1c2440" stroke-width="3"/>
    <path d="M26 4 A22 22 0 0 1 48 26" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  </svg>
</div>
<div id="hint">POINT AT A LABEL OR INVOICE</div>

<!-- RESULTS -->

<div id="results-panel">
  <div id="results-header">
    <div id="results-label">Active Ingredients</div>
    <div id="drug-count"></div>
  </div>
  <div id="ingredients-list"></div>
</div>

<script>
const SCAN_INTERVAL = 3500;
const API_MODEL = "claude-sonnet-4-20250514";

let mode = 'label';
let scanning = false;
let isAnalyzing = false;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusDot = document.getElementById('status-dot');
const scanOverlay = document.getElementById('scan-overlay');
const receiptOverlay = document.getElementById('receipt-overlay');
const resultsPanel = document.getElementById('results-panel');
const ingredientsList = document.getElementById('ingredients-list');
const loadingRing = document.getElementById('loading-ring');
const hint = document.getElementById('hint');
const flash = document.getElementById('flash');
const modeBadge = document.getElementById('mode-badge');
const drugCount = document.getElementById('drug-count');

function selectMode(m) {
  mode = m;
  document.getElementById('card-label').classList.toggle('selected', m === 'label');
  document.getElementById('card-invoice').classList.toggle('selected', m === 'invoice');
}

async function startScanner() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('start-screen').style.display = 'none';
    applyModeUI();
    statusDot.classList.add('active');
    hint.classList.add('visible');
    scanning = true;
    setTimeout(captureAndAnalyze, SCAN_INTERVAL);
  } catch (e) {
    alert('Camera access denied. Please allow camera permissions and reload.');
  }
}

function applyModeUI() {
  if (mode === 'label') {
    scanOverlay.classList.add('visible');
    receiptOverlay.classList.remove('visible');
    modeBadge.textContent = 'LABEL MODE';
  } else {
    receiptOverlay.classList.add('visible');
    scanOverlay.classList.remove('visible');
    modeBadge.textContent = 'INVOICE MODE';
  }
}

async function captureAndAnalyze() {
  if (!scanning || isAnalyzing) { setTimeout(captureAndAnalyze, SCAN_INTERVAL); return; }
  isAnalyzing = true;

  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const base64 = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];

  flash.classList.remove('flash'); void flash.offsetWidth; flash.classList.add('flash');
  statusDot.className = 'loading';
  loadingRing.classList.add('visible');
  hint.classList.remove('visible');

  const systemPrompt = mode === 'invoice'
    ? `You are a pharmacy invoice/receipt analyzer. The image shows a pharmacy receipt listing drug product names.

For EACH drug listed on the receipt, use your medical knowledge to identify its active ingredient(s). The receipt will NOT list ingredients — you must know them from the drug name.

Return ONLY a JSON array, no markdown:
[
  {
    "drug": "Drug name as printed on receipt",
    "price": "price string if visible, else null",
    "activeIngredients": [
      {
        "name": "Active ingredient",
        "dose": "Dose/strength if visible or well-known",
        "purpose": "What condition/symptom it treats, one sentence",
        "flag": false
      }
    ]
  }
]

flag = true for controlled substances, anticoagulants, immunosuppressants, or known common allergens.
If no receipt or drug list is visible, return [].`
    : `You are a drug label scanner. Extract ACTIVE INGREDIENTS from any product label visible.

Return ONLY a JSON array, no markdown:
[
  {
    "name": "Ingredient",
    "amount": "dose/concentration or null",
    "purpose": "one sentence",
    "flag": false
  }
]

flag = true for controlled substances, allergens, or high-risk ingredients.
If no label visible, return [].`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: API_MODEL,
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: mode === 'invoice'
              ? "This is a pharmacy receipt. Identify each drug and its active ingredients."
              : "Extract active ingredients from this label." }
          ]
        }]
      })
    });

    const data = await response.json();
    const raw = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    mode === 'invoice' ? renderInvoice(parsed) : renderLabel(parsed);
  } catch (err) {
    console.error('Scan error:', err);
  }

  statusDot.className = 'active';
  loadingRing.classList.remove('visible');
  isAnalyzing = false;
  setTimeout(captureAndAnalyze, SCAN_INTERVAL);
}

function renderInvoice(drugs) {
  if (!drugs || drugs.length === 0) {
    resultsPanel.classList.remove('visible');
    hint.classList.add('visible');
    return;
  }
  hint.classList.remove('visible');
  ingredientsList.innerHTML = '';
  drugCount.textContent = `${drugs.length} DRUG${drugs.length !== 1 ? 'S' : ''}`;

  drugs.forEach((drug, i) => {
    const group = document.createElement('div');
    group.className = 'drug-group';
    group.style.animationDelay = `${i * 70}ms`;

    const ings = (drug.activeIngredients || []).map(ing => `
      <div class="active-ing">
        <div class="ing-dot${ing.flag ? ' warn' : ''}"></div>
        <div class="ing-text">
          <div class="ing-name-text">${ing.name}${ing.flag ? ' <span style="font-size:10px;color:var(--warn)">⚠</span>' : ''}</div>
          <div class="ing-desc">${ing.purpose || ''}</div>
          ${ing.dose ? `<div class="ing-dose">${ing.dose}</div>` : ''}
        </div>
      </div>`).join('');

    group.innerHTML = `
      <div class="drug-header">
        <div class="drug-name">${drug.drug}</div>
        ${drug.price ? `<div class="drug-price">${drug.price}</div>` : ''}
      </div>
      <div class="drug-ingredients">
        ${ings || '<div style="font-size:11px;color:var(--muted)">No active ingredients found</div>'}
      </div>`;
    ingredientsList.appendChild(group);
  });

  resultsPanel.classList.add('visible');
}

function renderLabel(list) {
  if (!list || list.length === 0) {
    resultsPanel.classList.remove('visible');
    hint.classList.add('visible');
    return;
  }
  hint.classList.remove('visible');
  ingredientsList.innerHTML = '';
  drugCount.textContent = `${list.length} INGREDIENT${list.length !== 1 ? 'S' : ''}`;

  list.forEach((ing, i) => {
    const card = document.createElement('div');
    card.className = 'ingredient-card' + (ing.flag ? ' warn' : '');
    card.style.animationDelay = `${i * 60}ms`;
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px">
        <div class="ing-name-l">${ing.name}</div>
        ${ing.flag ? '<span style="font-size:10px;color:var(--warn);font-family:\'Space Mono\',monospace">⚠ FLAG</span>' : ''}
      </div>
      <div class="ing-detail-l">${ing.purpose || ''}</div>
      ${ing.amount ? `<div class="ing-amount-l">${ing.amount}</div>` : ''}`;
    ingredientsList.appendChild(card);
  });

  resultsPanel.classList.add('visible');
}
</script>

</body>
</html>
